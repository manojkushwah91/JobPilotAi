groups:
  - name: jobpilot-api
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'High HTTP 5xx error rate'
          description: 'Error rate is {{ $value | humanizePercentage }} for the last 5 minutes'

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High P95 latency'
          description: 'P95 latency is {{ $value }}s'

      - alert: HighAICost
        expr: sum(rate(ai_inference_cost_total[1h])) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High AI cost'
          description: 'AI inference cost is ${{ $value }}/hour'

      - alert: AIDown
        expr: ai_provider_up{provider="openai"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'AI Provider Down'
          description: 'OpenAI is not responding'

      - alert: HighDBConnections
        expr: hikaricp_connections_active > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High database connections'
          description: 'Active DB connections: {{ $value }}'

      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Circuit Breaker Open'
          description: 'Circuit breaker for {{ $labels.name }} is OPEN'
