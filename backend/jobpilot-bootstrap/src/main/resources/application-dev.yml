spring:
  cache:
    type: simple
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfigurationV2
  datasource:
    url: jdbc:postgresql://localhost:5432/jobpilot
    username: jobpilot
    password: jobpilot_dev
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 5000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: jobpilot-dev
      auto-offset-reset: earliest
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

logging:
  level:
    com.jobpilot: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

ai:
  openai:
    api-key: ${AI_OPENAI_API_KEY:sk-placeholder}
    model: gpt-4
  anthropic:
    api-key: ${AI_ANTHROPIC_API_KEY:sk-ant-placeholder}
  gemini:
    api-key: ${AI_GEMINI_API_KEY:placeholder}
  ollama:
    base-url: http://localhost:11434
    model: llama3.2
  cache:
    prompt-ttl-hours: 24
    embedding-ttl-days: 7
    max-size: 10000

jwt:
  access-token:
    expiration: 900000    # 15 min
  refresh-token:
    expiration: 604800000 # 7 days
  rsa:
    public-key: dev-placeholder
    private-key: dev-placeholder

security:
  rate-limiting:
    enabled: true
    default-limit: 100
    default-window-seconds: 60
  cors:
    allowed-origins: http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,PATCH
    allowed-headers: Authorization,Content-Type

opentelemetry:
  exporter:
    otlp:
      endpoint: http://localhost:4317
  traces:
    sampler: always_on

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: jobpilot
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

jobpilot:
  browser:
    headless: true
    proxy: ${JOBPILOT_PROXY:}
    slow-ms: 0
  proxy:
    enabled: false
    list: ${JOBPILOT_PROXY_LIST:}
    rotation-interval-ms: 300000
    max-failures: 3
  stealth:
    enabled: true
    min-delay-ms: 1000
    max-delay-ms: 5000
  multitab:
    max-tabs: 3
  cookies:
    dir: ./cookies
